<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body{
  font-family:Arial;
  background:#0f172a;
  color:white;
  text-align:center;
  padding:40px;
}

.box{
  background:#1e293b;
  padding:30px;
  width:40%;
  margin:auto;
  border-radius:15px;
}

input{
  width:90%;
  padding:10px;
  margin:10px 0;
  border-radius:8px;
  border:none;
}

button{
  padding:10px 15px;
  background:#22c55e;
  border:none;
  border-radius:10px;
  color:white;
  cursor:pointer;
  font-weight:bold;
}

.toast{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#22c55e;
  color:white;
  padding:12px 18px;
  border-radius:10px;
}

.error{
  background:#ef4444;
}
</style>
</head>

<body>

<h1>Login</h1>

<div class="box">
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <button onclick="login()">Login</button>
</div>

<script>

function showToast(msg, type="success"){
  let t = document.createElement("div");
  t.className = "toast";

  if(type === "error"){
    t.classList.add("error");
  }

  t.innerText = msg;
  document.body.appendChild(t);

  setTimeout(()=>{ t.remove(); }, 4000);
}

function login(){
  let email = document.getElementById("email").value;

  if(email.includes("@")){
    localStorage.setItem("user", email);

    showToast("Login Successful");

    setTimeout(()=>{
      window.location.href = "dashboard.html";
    },1500);

  }else{
    showToast("Invalid Email", "error");
  }
}

</script>

</body>
</html>
